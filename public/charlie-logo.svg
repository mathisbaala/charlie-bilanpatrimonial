<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#1C1914"/>
  <!-- White C shape: outer arc, then inner cutout, then close right -->
  <!-- C outline using path: outer arc going clockwise from top-right gap, inner arc counter-clockwise -->
  <path d="
    M 72 22
    A 38 38 0 1 0 72 78
    L 72 62
    A 22 22 0 1 1 72 38
    Z
  " fill="white"/>
  <!-- Inner detail: small quarter-circle at bottom-left of C cavity -->
  <circle cx="50" cy="72" r="10" fill="#1C1914"/>
  <rect x="40" y="62" width="20" height="10" fill="white"/>
</svg>
